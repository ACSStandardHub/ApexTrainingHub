<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex NHO — Co-Facilitator App</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0D1F3C;
  --navy-light: #162d54;
  --navy-mid: #1a3567;
  --gold: #C9A84C;
  --gold-light: #dfc06e;
  --gold-dim: #8a6e2e;
  --cream: #F5F3EE;
  --cream-dark: #e8e4db;
  --white: #ffffff;
  --gray-light: #f0ede8;
  --gray-mid: #c8c2b6;
  --gray-dark: #5a5448;
  --text-dark: #1a1612;
  --text-mid: #3d3830;
  --success: #2d6a4f;
  --success-light: #d8f3e8;
  --warn: #b5621a;
  --warn-light: #fdebd8;
  --alert: #6B1A1A;
  --alert-light: #fdf0f0;
  --sidebar-width: 300px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Barlow',sans-serif; background:var(--navy); color:var(--text-dark); min-height:100vh; overflow-x:hidden; }

/* ── SIDEBAR ── */
#sidebar {
  position:fixed; top:0; left:0; width:var(--sidebar-width); height:100vh;
  background:var(--navy); overflow-y:auto; z-index:100; display:flex; flex-direction:column;
  border-right:1px solid rgba(201,168,76,0.15);
}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}

.sidebar-logo { padding:24px 20px 16px; border-bottom:1px solid rgba(201,168,76,0.2); }
.brand-tag { font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); margin-bottom:6px; }
.brand-name { font-family:'EB Garamond',serif; font-size:18px; color:white; line-height:1.2; }
.brand-sub { font-size:10px; color:rgba(255,255,255,0.4); margin-top:3px; }

/* facilitator ID badge */
.facilitator-badge { padding:12px 20px; border-bottom:1px solid rgba(255,255,255,0.06); }
.badge-label { font-size:9px; color:rgba(255,255,255,0.35); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:6px; }
.badge-name { font-size:13px; font-weight:600; color:white; }
.badge-role { font-size:11px; color:var(--gold); }

/* session progress */
.session-progress { padding:12px 20px; border-bottom:1px solid rgba(255,255,255,0.06); }
.prog-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.prog-label { font-size:10px; color:rgba(255,255,255,0.4); letter-spacing:0.1em; }
.prog-pct { font-size:11px; font-weight:600; color:var(--gold); }
.prog-bar { height:3px; background:rgba(255,255,255,0.1); border-radius:2px; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--gold-dim),var(--gold)); border-radius:2px; transition:width 0.4s ease; }

/* day tabs */
.day-tabs { display:flex; padding:14px 20px 0; gap:5px; }
.day-tab { flex:1; padding:7px 4px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); border-radius:4px; font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.4); cursor:pointer; text-align:center; transition:all 0.2s; }
.day-tab.active { background:var(--gold); border-color:var(--gold); color:var(--navy); }
.day-tab:hover:not(.active) { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.7); }

/* nav items */
.nav-section { padding:10px 0; flex:1; }
.nav-day-label { padding:8px 20px 4px; font-size:9px; font-weight:600; letter-spacing:0.25em; text-transform:uppercase; color:var(--gold); opacity:0.7; }
.nav-item { display:flex; align-items:center; gap:8px; padding:9px 20px; cursor:pointer; transition:all 0.2s; border-left:3px solid transparent; }
.nav-item:hover { background:rgba(255,255,255,0.05); }
.nav-item.active { background:rgba(201,168,76,0.1); border-left-color:var(--gold); }
.nav-item.done { border-left-color:var(--success); }
.nav-item.hidden-day { display:none; }
.nav-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.15); flex-shrink:0; transition:all 0.2s; }
.nav-item.active .nav-dot { background:var(--gold); }
.nav-item.done .nav-dot { background:var(--success); }
.nav-type { font-size:8px; font-weight:700; letter-spacing:0.15em; padding:2px 6px; border-radius:2px; flex-shrink:0; }
.nav-type.classroom { background:rgba(13,31,60,0.5); color:rgba(255,255,255,0.5); }
.nav-type.floor { background:rgba(26,92,42,0.4); color:#6fcf97; }
.nav-type.handoff { background:rgba(201,168,76,0.2); color:var(--gold); }
.nav-text { font-size:11px; font-weight:500; color:rgba(255,255,255,0.55); line-height:1.3; flex:1; }
.nav-item.active .nav-text { color:rgba(255,255,255,0.9); }

/* ── MAIN ── */
#main { margin-left:var(--sidebar-width); min-height:100vh; background:var(--cream); }

/* topbar */
#topbar { background:var(--navy); padding:12px 40px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; border-bottom:2px solid var(--gold); }
.topbar-left { display:flex; flex-direction:column; gap:2px; }
.topbar-crumb { font-size:10px; color:rgba(255,255,255,0.4); letter-spacing:0.15em; text-transform:uppercase; }
.topbar-title { font-size:14px; font-weight:600; color:white; }
.topbar-actions { display:flex; gap:10px; align-items:center; }
.btn-nav { padding:7px 16px; border-radius:3px; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; border:none; font-family:'Barlow',sans-serif; }
.btn-prev { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.6); }
.btn-prev:hover { background:rgba(255,255,255,0.14); }
.btn-next { background:var(--gold); color:var(--navy); }
.btn-next:hover { background:var(--gold-light); }
.btn-done { background:var(--success); color:white; }
.btn-done:hover { background:#235a42; }

/* ── SECTIONS ── */
.section { display:none; animation:fadeIn 0.3s ease; }
.section.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* hero banner */
.hero-banner { background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 70%,#1e2d5a 100%); padding:48px 48px 40px; position:relative; overflow:hidden; }
.hero-banner::before { content:''; position:absolute; top:-40px; right:-40px; width:260px; height:260px; border-radius:50%; border:50px solid rgba(201,168,76,0.05); }
.hero-tag { display:inline-block; padding:4px 12px; background:rgba(201,168,76,0.15); border:1px solid rgba(201,168,76,0.3); border-radius:2px; font-size:9px; font-weight:700; letter-spacing:0.25em; text-transform:uppercase; color:var(--gold); margin-bottom:16px; }
.hero-title { font-family:'EB Garamond',serif; font-size:36px; color:white; line-height:1.15; margin-bottom:10px; }
.hero-sub { font-size:14px; color:rgba(255,255,255,0.5); max-width:560px; line-height:1.6; }

/* content body */
.content-body { padding:36px 48px; }

/* facilitator script block */
.script-block { background:var(--navy); border-radius:6px; padding:22px 28px; margin:20px 0; position:relative; }
.script-block::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--gold); border-radius:6px 0 0 6px; }
.script-label { font-size:9px; font-weight:700; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); margin-bottom:10px; }
.script-text { font-family:'EB Garamond',serif; font-size:15px; color:rgba(255,255,255,0.88); line-height:1.7; font-style:italic; }
.script-text strong { font-style:normal; color:white; font-weight:600; }

/* coaching cue */
.coaching-cue { background:rgba(181,98,26,0.1); border:1px dashed rgba(181,98,26,0.4); border-radius:6px; padding:14px 18px; margin:14px 0; }
.cue-label { font-size:9px; font-weight:700; letter-spacing:0.25em; text-transform:uppercase; color:var(--warn); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.cue-text { font-size:12.5px; color:var(--text-mid); line-height:1.6; }

/* watch for */
.watch-for { background:var(--alert-light); border-left:4px solid var(--alert); border-radius:0 6px 6px 0; padding:14px 18px; margin:14px 0; }
.watch-label { font-size:9px; font-weight:700; letter-spacing:0.25em; text-transform:uppercase; color:var(--alert); margin-bottom:6px; }
.watch-text { font-size:12.5px; color:var(--text-mid); line-height:1.6; }

/* timing block */
.timing-block { display:flex; gap:8px; flex-wrap:wrap; margin:16px 0; }
.timing-chip { padding:5px 14px; border-radius:20px; font-size:11px; font-weight:600; display:flex; align-items:center; gap:6px; }
.chip-classroom { background:rgba(13,31,60,0.1); color:var(--navy); }
.chip-floor { background:rgba(26,92,42,0.1); color:var(--success); }
.chip-handoff { background:rgba(201,168,76,0.15); color:var(--gold-dim); }
.chip-icon { font-size:13px; }

/* content block */
.content-block { margin-bottom:22px; }
.block-title { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--navy); border-bottom:2px solid var(--gold); display:inline-block; padding-bottom:2px; margin-bottom:10px; }
.content-list { list-style:none; display:flex; flex-direction:column; gap:7px; }
.content-list li { display:flex; gap:10px; font-size:13px; line-height:1.55; color:var(--text-mid); }
.content-list li::before { content:''; width:4px; height:4px; border-radius:50%; background:var(--gold); flex-shrink:0; margin-top:7px; }

/* handout checklist */
.handout-checklist { background:white; border:1px solid var(--cream-dark); border-radius:6px; overflow:hidden; margin:16px 0; }
.handout-header { background:var(--navy); padding:10px 16px; display:flex; justify-content:space-between; align-items:center; }
.handout-header-text { font-size:11px; font-weight:700; color:var(--gold); letter-spacing:0.15em; text-transform:uppercase; }
.handout-row { display:flex; align-items:center; gap:12px; padding:10px 16px; border-bottom:1px solid var(--cream-dark); cursor:pointer; transition:all 0.2s; }
.handout-row:last-child { border-bottom:none; }
.handout-row:hover { background:var(--gray-light); }
.handout-row.checked { background:var(--success-light); }
.handout-check { width:18px; height:18px; border:2px solid var(--cream-dark); border-radius:3px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; transition:all 0.2s; }
.handout-row.checked .handout-check { background:var(--success); border-color:var(--success); color:white; }
.handout-name { flex:1; font-size:12.5px; font-weight:600; color:var(--navy); }
.handout-detail { font-size:11px; color:var(--gray-dark); }
.handout-when { font-size:10px; font-weight:600; color:var(--gold-dim); background:rgba(201,168,76,0.1); padding:2px 8px; border-radius:10px; flex-shrink:0; }

/* notes field */
.notes-area { margin:20px 0; }
.notes-label { font-size:10px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:8px; }
.notes-input { width:100%; padding:14px 16px; font-family:'Barlow',sans-serif; font-size:13px; color:var(--text-dark); border:1px solid var(--cream-dark); border-radius:6px; resize:vertical; min-height:100px; background:white; outline:none; transition:border-color 0.2s; }
.notes-input:focus { border-color:var(--gold); }
.notes-input::placeholder { color:var(--gray-mid); }

/* agent roster */
.roster-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; margin:14px 0; }
.roster-card { background:white; border:1px solid var(--cream-dark); border-radius:6px; padding:12px 14px; cursor:pointer; transition:all 0.2s; }
.roster-card:hover { border-color:var(--gold); }
.roster-card.flagged { border-color:var(--alert); background:var(--alert-light); }
.roster-card.strong { border-color:var(--success); background:var(--success-light); }
.roster-name { font-size:13px; font-weight:700; color:var(--navy); margin-bottom:4px; }
.roster-role { font-size:11px; color:var(--gray-dark); }
.roster-flags { display:flex; gap:4px; flex-wrap:wrap; margin-top:8px; }
.flag { font-size:9px; font-weight:700; padding:2px 6px; border-radius:2px; letter-spacing:0.1em; }
.flag-attention { background:rgba(107,26,26,0.1); color:var(--alert); }
.flag-strong { background:rgba(45,106,79,0.1); color:var(--success); }
.flag-quiet { background:rgba(90,84,72,0.1); color:var(--gray-dark); }

/* two-col layout */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }

/* stat row */
.stat-row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:20px; }
.stat-box { background:white; border:1px solid var(--cream-dark); border-radius:6px; padding:14px 18px; flex:1; min-width:120px; }
.stat-num { font-family:'EB Garamond',serif; font-size:28px; color:var(--navy); line-height:1; margin-bottom:4px; }
.stat-label { font-size:11px; color:var(--gray-dark); }

/* divider */
.divider { height:1px; background:var(--cream-dark); margin:24px 0; }
.gold-divider { height:2px; background:linear-gradient(90deg,var(--gold),transparent); margin:24px 0; border:none; }

/* floor block */
.floor-block { background:linear-gradient(135deg,#0a2010 0%,#1a4a28 100%); border-radius:8px; padding:24px 28px; margin:20px 0; border:1px solid rgba(111,207,151,0.2); }
.floor-block-label { font-size:9px; font-weight:700; letter-spacing:0.3em; text-transform:uppercase; color:#6fcf97; margin-bottom:10px; }
.floor-block-title { font-family:'EB Garamond',serif; font-size:22px; color:white; margin-bottom:14px; }
.floor-list { list-style:none; display:flex; flex-direction:column; gap:8px; }
.floor-list li { display:flex; gap:10px; font-size:13px; line-height:1.5; color:rgba(255,255,255,0.8); }
.floor-list li::before { content:'→'; color:#6fcf97; flex-shrink:0; font-weight:700; }

/* comment box */
.comment-box { background:white; border:1px solid var(--cream-dark); border-radius:6px; padding:14px 16px; margin:10px 0; }
.comment-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.comment-author { font-size:11px; font-weight:700; color:var(--navy); }
.comment-time { font-size:10px; color:var(--gray-dark); }
.comment-text { font-size:13px; color:var(--text-mid); line-height:1.5; }
.comment-input-row { display:flex; gap:8px; margin-top:12px; }
.comment-input { flex:1; padding:9px 12px; border:1px solid var(--cream-dark); border-radius:4px; font-family:'Barlow',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s; }
.comment-input:focus { border-color:var(--gold); }
.btn-comment { padding:9px 18px; background:var(--navy); color:white; border:none; border-radius:4px; font-family:'Barlow',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.btn-comment:hover { background:var(--navy-mid); }

/* mobile */
#menu-toggle { display:none; position:fixed; top:14px; left:14px; width:40px; height:40px; background:var(--navy); border:none; border-radius:4px; cursor:pointer; z-index:200; flex-direction:column; align-items:center; justify-content:center; gap:5px; }
#menu-toggle span { display:block; width:20px; height:2px; background:white; border-radius:1px; }
@media(max-width:768px) { #menu-toggle{display:flex} #sidebar{transform:translateX(-100%)} #sidebar.open{transform:translateX(0)} #main{margin-left:0} .two-col{grid-template-columns:1fr} .content-body{padding:24px 20px} }
</style>
</head>
<body>
<a href="index.html">← Back to Training Library</a>
<button id="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
  <span></span><span></span><span></span>
</button>

<nav id="sidebar">
  <div class="sidebar-logo">
    <div class="brand-tag">Co-Facilitator App</div>
    <div class="brand-name">Apex Concierge Services</div>
    <div class="brand-sub">New Hire Orientation · Internal Use Only</div>
  </div>

  <div class="facilitator-badge">
    <div class="badge-label">Facilitating as</div>
    <div class="badge-name" id="facilitatorName">Select Facilitator ▾</div>
    <div class="badge-role" id="facilitatorRole"></div>
  </div>

  <div class="session-progress">
    <div class="prog-row">
      <span class="prog-label">Session Progress</span>
      <span class="prog-pct" id="progPct">0%</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <div class="day-tabs">
    <div class="day-tab active" onclick="switchDay(1)">Day 1</div>
    <div class="day-tab" onclick="switchDay(2)">Day 2</div>
    <div class="day-tab" onclick="switchDay(3)">Day 3</div>
  </div>

  <div class="nav-section" id="navList"></div>
</nav>

<div id="main">
  <div id="topbar">
    <div class="topbar-left">
      <div class="topbar-crumb" id="topCrumb">Session Overview</div>
      <div class="topbar-title" id="topTitle">Apex New Hire Orientation — Co-Facilitator</div>
    </div>
    <div class="topbar-actions">
      <button class="btn-nav btn-prev" onclick="navigate(-1)">← Prev</button>
      <button class="btn-nav btn-done" onclick="markDone()">✓ Mark Done</button>
      <button class="btn-nav btn-next" onclick="navigate(1)">Next →</button>
    </div>
  </div>
  <div id="content"></div>
</div>

  { id:"d2-overview", day:2, type:"classroom", navText:"Day 2 Overview", title:"Day 2 Overview", render:renderD2Overview },

  { id:"d3-overview", day:3, type:"classroom", navText:"Day 3 Overview", title:"Day 3 Overview", render:renderD3Overview },

function script(text) {
  return `<div class="script-block"><div class="script-label">📢 Say This</div><div class="script-text">${text}</div></div>`;
}

function cue(text) {
  return `<div class="coaching-cue"><div class="cue-label">⚡ Coaching Cue</div><div class="cue-text">${text}</div></div>`;
}

function watchFor(text) {
  return `<div class="watch-for"><div class="watch-label">👁 Watch For</div><div class="watch-text">${text}</div></div>`;
}

function handouts(items) {
  const rows = items.map(([name, detail, when], i) => `
    <div class="handout-row" onclick="toggleHandout(this)" id="ho-${currentIdx}-${i}">
      <div class="handout-check" id="hc-${currentIdx}-${i}"></div>
      <div class="handout-name">${name}</div>
      <div class="handout-detail">${detail}</div>
      <div class="handout-when">${when}</div>
    </div>`).join('');
  return `<div class="handout-checklist">
    <div class="handout-header"><span class="handout-header-text">📋 Handouts for This Block</span><span style="font-size:10px;color:rgba(255,255,255,0.4)">Tap to mark distributed</span></div>
    ${rows}
  </div>`;
}

function bullets(title, items) {
  return `<div class="content-block"><div class="block-title">${title}</div><ul class="content-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
}

function sectionHero(tag, title, sub) {
  return `<div class="hero-banner"><div class="hero-tag">${tag}</div><div class="hero-title">${title}</div><div class="hero-sub">${sub}</div></div>`;
}

function notesField(id) {
  const saved = sessionNotes[id] || '';
  return `<div class="notes-area">
    <div class="notes-label">🗒 Session Notes — ${id}</div>
    <textarea class="notes-input" id="notes-${id}" placeholder="Add your observations, agent responses, things to follow up on…" onchange="saveNote('${id}',this.value)">${saved}</textarea>
  </div>`;
}

function commentsPanel(id) {
  const msgs = comments[id] || [];
  const msgHtml = msgs.map(m => `<div class="comment-box"><div class="comment-header"><span class="comment-author">${m.author}</span><span class="comment-time">${m.time}</span></div><div class="comment-text">${m.text}</div></div>`).join('');
  return `<div class="content-block" style="margin-top:24px">
    <div class="block-title">Team Comments</div>
    <div id="comments-${id}">${msgHtml || '<div style="color:var(--gray-dark);font-size:12px;padding:8px 0">No comments yet — add one below.</div>'}</div>
    <div class="comment-input-row">
      <input class="comment-input" id="ci-${id}" placeholder="Add a comment, observation, or flag for this section…" onkeydown="if(event.key==='Enter')addComment('${id}')">
      <button class="btn-comment" onclick="addComment('${id}')">Post</button>
    </div>
  </div>`;
}

function agentRoster() {
  return `<div class="content-block">
    <div class="block-title">Agent Roster — Flag & Track</div>
    <div class="roster-grid">
      ${agentData.map((a,i) => `
        <div class="roster-card ${a.flags.includes('attention')?'flagged':a.flags.includes('strong')?'strong':''}" id="rc-${i}" onclick="showAgentMenu(${i})">
          <div class="roster-name">${a.name}</div>
          <div class="roster-role">${a.role} · ${a.property}</div>
          <div class="roster-flags">${a.flags.map(f=>`<span class="flag flag-${f}">${f.toUpperCase()}</span>`).join('')}</div>

    </div>
    <div style="font-size:11px;color:var(--gray-dark);margin-top:8px">Tap an agent card to flag their engagement level.</div>
  </div>`;
}

function chipRow(blocks) {
  return `<div class="timing-block">${blocks.map(([icon,label,type])=>`<div class="timing-chip chip-${type}"><span class="chip-icon">${icon}</span>${label}</div>`).join('')}</div>`;
}

// ── ENGINE ────────────────────────────────────────────────────────────────────

function buildNav() {
  const list = document.getElementById('navList');
  list.innerHTML = '';
  [1,2,3].forEach(day => {
    const label = document.createElement('div');
    label.className = 'nav-day-label';
    label.id = `nav-day-${day}`;
    label.textContent = `Day ${day}`;
    if(day !== activeDay) label.style.display = 'none';
    list.appendChild(label);
    SECTIONS.filter(s => s.day === day).forEach(s => {
      const idx = SECTIONS.indexOf(s);
      const item = document.createElement('div');
      item.className = `nav-item${idx===currentIdx?' active':''}${done.has(idx)?' done':''}${s.day!==activeDay?' hidden-day':''}`;
      item.id = `nav-${idx}`;
      item.onclick = () => goTo(idx);
      item.innerHTML = `<div class="nav-dot"></div><span class="nav-type ${s.type}">${s.type.toUpperCase()}</span><span class="nav-text">${s.navText}</span>`;
      list.appendChild(item);
    });
  });
}

function updateProgress() {
  const pct = Math.round((done.size / SECTIONS.length) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progPct').textContent = pct + '%';
}

function goTo(idx) {
  if(idx < 0 || idx >= SECTIONS.length) return;
  currentIdx = idx;
  const s = SECTIONS[idx];
  activeDay = s.day;
  document.querySelectorAll('.day-tab').forEach((t,i) => t.classList.toggle('active', i+1===activeDay));
  document.querySelectorAll('.nav-item').forEach((el,i) => {
    el.classList.toggle('active', i===currentIdx);
    el.classList.toggle('hidden-day', SECTIONS[i].day !== activeDay);
  });
  document.querySelectorAll('.nav-day-label').forEach(el => {
    const d = parseInt(el.id.split('-')[2]);
    el.style.display = d === activeDay ? '' : 'none';
  });
  document.getElementById('topCrumb').textContent = `Day ${s.day} · ${s.type.charAt(0).toUpperCase()+s.type.slice(1)}`;
  document.getElementById('topTitle').textContent = s.title;
  document.getElementById('content').innerHTML = `<div class="section active">${s.render()}</div>`;
  document.getElementById('main').scrollTo?document.getElementById('main').scrollTo(0,0):window.scrollTo(0,0);
  updateProgress();
}

function navigate(dir) { goTo(currentIdx + dir); }
function switchDay(d) { const f = SECTIONS.find(s => s.day === d); if(f) goTo(SECTIONS.indexOf(f)); }
function markDone() {
  done.add(currentIdx);
  const el = document.getElementById(`nav-${currentIdx}`);
  if(el) { el.classList.add('done'); el.classList.remove('active'); }
  updateProgress();
  navigate(1);
}
function toggleHandout(el) {
  el.classList.toggle('checked');
  const check = el.querySelector('.handout-check');
  if(check) check.textContent = el.classList.contains('checked') ? '✓' : '';
}
function saveNote(id, val) { sessionNotes[id] = val; }
function addComment(id) {
  const input = document.getElementById(`ci-${id}`);
  if(!input || !input.value.trim()) return;
  if(!comments[id]) comments[id] = [];
  const author = currentFacilitator ? currentFacilitator.name : 'Facilitator';
  const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  comments[id].push({ author, time, text: input.value.trim() });
  input.value = '';
  goTo(currentIdx);
}
function showAgentMenu(idx) {
  const flags = ['attention','strong','quiet'];
  const agent = agentData[idx];
  const next = flags.find(f => !agent.flags.includes(f)) || '';
  if(!next) { agent.flags = []; }
  else {
    if(agent.flags.includes(next)) agent.flags = agent.flags.filter(f => f !== next);
    else { agent.flags = [next]; }
  }
  goTo(currentIdx);
}

// Facilitator selector modal
function showFacilitatorSelect() {
  const existing = document.getElementById('fac-modal');
  if(existing) { existing.remove(); return; }
  const modal = document.createElement('div');
  modal.id = 'fac-modal';
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center';
  modal.innerHTML = `<div style="background:var(--navy);border-radius:8px;padding:28px;min-width:300px;border:1px solid rgba(201,168,76,0.3)">
    <div style="font-size:10px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:16px">Select Facilitator</div>
    ${FACILITATORS.map((f,i) => `<div onclick="selectFacilitator(${i})" style="padding:12px 16px;cursor:pointer;border-radius:4px;margin-bottom:6px;background:rgba(255,255,255,0.06);transition:all 0.2s" onmouseover="this.style.background='rgba(201,168,76,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.06)'">
      <div style="font-size:13px;font-weight:600;color:white">${f.name}</div>
      <div style="font-size:11px;color:var(--gold)">${f.role}</div>
    </div>`).join('')}
    <div onclick="document.getElementById('fac-modal').remove()" style="margin-top:12px;text-align:center;font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer">Cancel</div>
  </div>`;
  document.body.appendChild(modal);
}
function selectFacilitator(idx) {
  currentFacilitator = FACILITATORS[idx];
  document.getElementById('facilitatorName').textContent = currentFacilitator.name;
  document.getElementById('facilitatorRole').textContent = currentFacilitator.role;
  document.getElementById('fac-modal').remove();
}

document.getElementById('facilitatorName').onclick = showFacilitatorSelect;

// INIT
buildNav();
goTo(0);
</script>
